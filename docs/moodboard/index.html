<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Share-A-Scooter Amberg - Moodboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="masthead">
      <div class="masthead__topline">
        <a class="backlink" href="../">Hub</a>
        <nav class="jumpnav" aria-label="Bereiche">
          <a href="#farbe">Farbe</a>
          <a href="#frames">Frames</a>
          <a href="#logos">Logos</a>
          <a href="#typo">Typo</a>
        </nav>
      </div>
      <p class="masthead__eyebrow">Share-A-Scooter Amberg</p>
      <h1 class="masthead__title">Moodboard</h1>
      <p class="masthead__copy">Die Wand fuer die visuelle Richtung des Prototyps: reduziert, dunkel, mobil, technisch.</p>
      <div class="signal-strip" aria-hidden="true">
        <span style="background:#071116"></span>
        <span style="background:#0c1b22"></span>
        <span style="background:#7ee892"></span>
        <span style="background:#8de4ff"></span>
        <span style="background:#ff8e6b"></span>
      </div>
    </header>

    <section class="board board--highlight">
      <div class="board__cluster">
        <img src="assets/farbe/farbe-11.jpg" alt="Farbpalette mit Lime, Blau und dunklen Naturtoenen" />
      </div>
      <div class="board__cluster">
        <img src="assets/frames/frames-04.jpg" alt="Dunkler Scooter-App-Flow als Referenz" />
      </div>
      <div class="board__cluster">
        <img src="assets/logos/logos-16.png" alt="Lime-Logo als Mobilitaetsreferenz" />
      </div>
      <div class="board__cluster">
        <img src="assets/typo/typo-03.jpg" alt="Typografische Scooter-Wortmarke als Referenz" />
      </div>
    </section>

    <section class="section" id="farbe">
      <div class="section__head">
        <h2>Farbe</h2>
      </div>
      <div class="masonry" id="gallery-farbe"></div>
    </section>

    <section class="section" id="frames">
      <div class="section__head">
        <h2>Frames</h2>
      </div>
      <div class="masonry" id="gallery-frames"></div>
    </section>

    <section class="section" id="logos">
      <div class="section__head">
        <h2>Logos</h2>
      </div>
      <div class="masonry masonry--logos" id="gallery-logos"></div>
    </section>

    <section class="section" id="typo">
      <div class="section__head">
        <h2>Typo</h2>
      </div>
      <div class="masonry" id="gallery-typo"></div>
    </section>
  </main>

  <script>
    const galleries = {
      farbe: [
        "farbe-01.jpg", "farbe-02.jpg", "farbe-03.jpg", "farbe-04.jpg",
        "farbe-05.jpg", "farbe-06.jpg", "farbe-07.jpg", "farbe-08.jpg",
        "farbe-09.jpg", "farbe-10.jpg", "farbe-11.jpg", "farbe-12.jpg"
      ],
      frames: [
        "frames-01.jpg", "frames-02.jpg", "frames-03.jpg", "frames-04.jpg", "frames-05.jpg",
        "frames-06.jpg", "frames-07.jpg", "frames-08.jpg", "frames-09.jpg", "frames-10.jpg",
        "frames-11.jpg", "frames-12.jpg", "frames-13.jpg", "frames-14.jpg", "frames-15.jpeg",
        "frames-16.webp", "frames-17.jpeg", "frames-18.jpg", "frames-19.jpg", "frames-20.webp"
      ],
      logos: [
        "logos-01.jpg", "logos-02.jpg", "logos-03.webp", "logos-04.jpg", "logos-05.jpg",
        "logos-06.jpg", "logos-07.jpg", "logos-08.jpg", "logos-09.jpg", "logos-10.jpg",
        "logos-11.png", "logos-12.jpg", "logos-13.jpg", "logos-14.jpg", "logos-15.jpeg",
        "logos-16.png", "logos-17.jpg"
      ],
      typo: [
        "typo-01.jpg", "typo-02.jpg", "typo-03.jpg", "typo-04.jpg", "typo-05.jpg",
        "typo-06.jpeg", "typo-07.jpg", "typo-08.jpg", "typo-09.jpg"
      ]
    };

    Object.entries(galleries).forEach(([category, files]) => {
      const mount = document.getElementById(`gallery-${category}`);
      files.forEach((file, index) => {
        const tile = document.createElement("figure");
        tile.className = `tile tile--${category}`;

        const image = document.createElement("img");
        image.src = `assets/${category}/${file}`;
        image.alt = `${category} Referenz ${String(index + 1).padStart(2, "0")}`;
        image.loading = "lazy";
        image.decoding = "async";

        tile.appendChild(image);
        mount.appendChild(tile);
      });
    });
  </script>
</body>
</html>
