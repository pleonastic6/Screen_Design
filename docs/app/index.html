<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Share-A-Scooter Amberg - Map Screen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="map-screen">
    <div class="map-frame" id="main-map" aria-label="Karte mit Scootern und Ladehubs"></div>

    <div class="map-topbar">
      <div class="map-chip">Amberg</div>
      <div class="map-chip map-chip-strong">3 Scooter in der Naehe</div>
    </div>

    <div class="map-legend">
      <span class="legend-item"><i class="legend-dot scooter"></i>Scooter</span>
      <span class="legend-item"><i class="legend-dot hub"></i>Ladehub</span>
      <span class="legend-item"><i class="legend-dot user"></i>Standort</span>
    </div>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
