<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Share-A-Scooter Amberg - Map Screen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="map-screen">
    <div class="map-frame" id="main-map" aria-label="Karte mit Scootern und Ladehubs"></div>
    <aside class="vehicle-card" id="vehicle-card" aria-hidden="true">
      <button class="vehicle-card__close" id="vehicle-card-close" type="button" aria-label="Infocard schliessen">
        <span aria-hidden="true">×</span>
      </button>
      <div class="vehicle-card__body">
        <div class="vehicle-card__content">
          <p class="vehicle-card__eyebrow" id="vehicle-card-type">E-Scooter in der Naehe</p>
          <h2 class="vehicle-card__title" id="vehicle-card-name">E-Scooter XXX-JWM</h2>
          <div class="vehicle-card__meta">
            <div class="vehicle-card__meta-item">
              <span class="vehicle-card__meta-icon vehicle-card__meta-icon--battery" aria-hidden="true"></span>
              <span id="vehicle-card-range">54 km Reichweite</span>
            </div>
            <div class="vehicle-card__meta-item vehicle-card__meta-item--price">
              <span class="vehicle-card__meta-icon vehicle-card__meta-icon--price" aria-hidden="true"></span>
              <span id="vehicle-card-price">1,00 EUR entsperren, 0,19 EUR/Min</span>
            </div>
          </div>
        </div>
        <div class="vehicle-card__visual" aria-hidden="true">
          <div class="vehicle-card__vehicle">
            <span class="vehicle-card__wheel vehicle-card__wheel--front"></span>
            <span class="vehicle-card__wheel vehicle-card__wheel--rear"></span>
            <span class="vehicle-card__deck"></span>
            <span class="vehicle-card__stem"></span>
            <span class="vehicle-card__handle"></span>
          </div>
        </div>
      </div>
      <div class="vehicle-card__actions">
        <button class="vehicle-card__pill" type="button">Klingeln</button>
        <button class="vehicle-card__pill" type="button">Problem melden</button>
      </div>
      <button class="vehicle-card__reserve" type="button">
        <span class="vehicle-card__reserve-title">Reservieren</span>
        <span class="vehicle-card__reserve-subtitle">Kostenlos fuer 10 Minuten</span>
      </button>
    </aside>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="app.js"></script>
</body>
</html>
